name: Vaccine Live Update

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  refresh-packages:
    name: Refresh Live Vaccine Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/api/requirements.txt

      - name: Run Vaccine Update Cycle
        run: python3 backend/vaccine_pipeline/run_update_cycle.py

      - name: Validate Vaccine Registries
        run: |
          python3 tools/content/validate_vaccine_source_registry.py
          python3 tools/content/validate_locale_vaccine_requirements.py

      - name: Validate Vaccine Pipeline Health
        id: vaccine_health
        continue-on-error: true
        run: python3 tools/content/validate_vaccine_pipeline_health.py --strict-live

      - name: Build Vaccine Health Report
        if: always()
        run: |
          python3 tools/content/build_vaccine_pipeline_health_report.py \
            --report-out /tmp/vaccine_health_report.md \
            --metadata-out /tmp/vaccine_health_metadata.json

      - name: Publish Vaccine Health Summary
        if: always()
        run: cat /tmp/vaccine_health_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Sync Vaccine Alert Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const metadata = JSON.parse(fs.readFileSync('/tmp/vaccine_health_metadata.json', 'utf8'));
            const report = fs.readFileSync('/tmp/vaccine_health_report.md', 'utf8');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = metadata.label || 'vaccine-pipeline-alert';
            const title = metadata.issueTitle || 'Vaccine Pipeline Alert';
            const alertBody = [
              'Automated vaccine pipeline monitor.',
              '',
              report,
            ].join('\n');

            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: 'D97706',
                  description: 'Automated vaccine source freshness and ingest alerts',
                });
              } else {
                throw error;
              }
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            const matchingIssues = openIssues.filter((issue) => issue.title === title);

            if (metadata.hasAlerts) {
              if (matchingIssues.length > 0) {
                for (const issue of matchingIssues) {
                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: issue.number,
                    title,
                    body: alertBody,
                  });
                }
              } else {
                await github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body: alertBody,
                  labels: [label],
                });
              }
              return;
            }

            for (const issue of matchingIssues) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: 'Automated monitor: vaccine pipeline is healthy again. Closing this alert.',
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Validate Pipeline Python Files
        run: |
          python3 -m py_compile \
            backend/vaccine_pipeline/canonicalize.py \
            backend/vaccine_pipeline/diffing.py \
            backend/vaccine_pipeline/publish.py \
            backend/vaccine_pipeline/run_update_cycle.py \
            backend/vaccine_pipeline/validator.py \
            backend/vaccine_pipeline/adapters/base.py \
            backend/vaccine_pipeline/adapters/live_source_adapter.py \
            backend/vaccine_pipeline/adapters/local_fixture_adapter.py \
            tools/content/build_vaccine_pipeline_health_report.py \
            tools/content/validate_locale_vaccine_requirements.py \
            tools/content/validate_vaccine_pipeline_health.py \
            tools/content/validate_vaccine_source_registry.py

      - name: Run Vaccine Pipeline Tests
        run: python3 -m unittest backend.tests.test_live_source_adapter backend.tests.test_vaccine_pipeline_health -v

      - name: Verify Vaccine Package API End-to-End
        run: |
          BABYTRACK_API_TOKENS="ci-token" python3 backend/api/server_stdlib.py > /tmp/babytrack_vaccine_api.log 2>&1 &
          PID=$!
          trap 'kill $PID >/dev/null 2>&1 || true' EXIT

          for i in {1..40}; do
            if curl -sSf http://127.0.0.1:8787/health >/dev/null 2>&1; then
              break
            fi
            sleep 0.2
          done

          curl -sS \
            -H 'Authorization: Bearer ci-token' \
            http://127.0.0.1:8787/v1/vaccines/packages/index \
            > /tmp/vaccine_index.json

          python - <<'PY'
          import json

          with open('/tmp/vaccine_index.json', 'r', encoding='utf-8') as handle:
              payload = json.load(handle)

          packages = payload.get('packages', [])
          assert len(packages) >= 9, payload
          countries = {item.get('country', '') for item in packages}
          expected = {'TR', 'US', 'GB', 'DE', 'FR', 'ES', 'IT', 'BR', 'SA'}
          assert expected.issubset(countries), countries

          for item in packages:
              assert item.get('sourceUrl'), item
              assert item.get('sourceUpdatedAt'), item
          PY

      - name: Fail Workflow On Live Health Errors
        if: steps.vaccine_health.outcome == 'failure'
        run: exit 1

      - name: Create Pull Request (if changed)
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/vaccine-live-refresh
          delete-branch: true
          commit-message: "chore(vaccine): refresh live packages"
          title: "chore(vaccine): refresh live vaccine packages"
          body: |
            Automated vaccine package refresh.

            - Runs live source adapters for configured countries.
            - Publishes changed packages only.
            - Updates source state metadata for change tracking.
          add-paths: |
            backend/vaccine_pipeline/output
